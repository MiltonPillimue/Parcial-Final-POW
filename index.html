<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacen de repuesto de motos</title>

    <meta name="description" content="Sistema de registro de clientes">
    <meta name="keywords" content="motos, registro, taller">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="stylo.css">

</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Almacen de Repuesto de Motos</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuarios</a></li>
                    <li class="nav-item">
                        <button class="btn btn-light ms-2"
                            data-bs-toggle="modal"
                            data-bs-target="#registro">
                            Registrarse
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container text-center mt-5">
        <h1>Bienvenido a Almacen de Repuesto de Motos</h1>
        <p>Registra y administra los clientes de tu taller de motos.</p>

        <img src="foto.jpg" alt="Motos" class="img-fluid my-4 w-50 rounded mx-auto d-block">

        <button class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#registro">
            Registrar Cliente
        </button>
    </section>

    <div class="modal fade" id="registro">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Registro</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form id="formRegistro">

                        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

                        <input type="email" id="correo" class="form-control mb-3" placeholder="Correo">

                        <input type="text" id="telefono" class="form-control mb-3" placeholder="Teléfono">

                        <input type="text" id="ciudad" class="form-control mb-3" placeholder="Ciudad">

                        <button class="btn btn-success w-100">
                            Guardar
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 Almacen de Repuesto de Motos
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
